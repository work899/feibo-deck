name: agent-harness-tool-use
purpose: Regression cases for tool discipline.
cases:
  - id: url_fetch_exact
    user: "What does https://example.com/policy say about refunds?"
    expected_route: fetch_exact_url
    must:
      - fetch_user_url
      - answer_from_fetched_content

  - id: no_fake_execution
    user: "Did the tests pass?"
    expected_route: run_or_report_not_run
    must_not:
      - claim_pass_without_running_or_observing

  - id: batch_read_only_context
    user: "Map the repo structure."
    expected_route: parallel_read_inspection
    must:
      - inspect_files
      - synthesize_structure
