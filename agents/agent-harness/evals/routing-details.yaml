name: agent-harness-routing-details
purpose: Regression cases for small but important routing details learned from the source prompt.
cases:
  - id: exact_url_fetch
    user: "Summarize what https://example.com/terms says about refunds."
    expected_route: fetch_exact_url
    must:
      - use_exact_url
      - answer_from_fetched_content

  - id: unknown_named_entity_lookup
    user: "Is Tofes 17 worth trying?"
    expected_route: lookup_unknown_entity
    must:
      - identify_entity_before_opinion
      - avoid_guessing_from_name

  - id: current_policy_lookup
    user: "What's the current Social Security retirement age?"
    expected_route: current_source_lookup
    must:
      - use_current_source
      - cite_or_link_source

  - id: stable_historical_direct
    user: "When did the Apollo 11 landing happen?"
    expected_route: answer_directly
    must_not:
      - web_search
    notes: "Settled historical facts should not trigger search unless the user asks for sources or current status."

  - id: familiar_series_new_release
    user: "What is the newest book in the Murderbot series?"
    expected_route: current_source_lookup
    must:
      - use_current_source
      - avoid_guessing_from_name
    notes: "Knowing a series does not mean knowing its latest release."

  - id: present_tense_status_lookup
    user: "Does this Python package still exist?"
    expected_route: current_source_lookup
    must:
      - use_current_source
      - cite_or_link_source
    notes: "Present-tense status questions require current evidence."

  - id: inline_strategy_not_file
    user: "Give me a quick strategy for handling flaky tests."
    expected_route: answer_directly
    must_not:
      - create_file
    notes: "Strategy/explanation is conversational unless the user asks for durable output."

  - id: long_task_context_refresh
    user: "continue"
    expected_route: refresh_current_context
    must:
      - restate_objective
      - use_newest_evidence
      - continue_next_action
